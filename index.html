<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>Perturbed</title>

	<style>
		* {
			padding: 0px;
			margin: 0px;
		}

		html,
		body {
			width: calc(100% - 0px);
			height: calc(100% - 0px);
			overflow: hidden;
		}

		.grid {
			width: calc(100% - 1px);
			height: calc(100% - 1px);
			display: grid;
			grid-template-columns: minmax(min-content, max-content) auto minmax(min-content, max-content);
			grid-auto-rows: minmax(min-content, max-content) auto minmax(min-content, max-content);


			grid-template-areas:
				"header header header"
				"left main right"
				"footer footer footer";

			/* "header header header header header header header header header"
					"left left main main main main main right right"
					"footer footer footer footer footer footer footer footer footer"; */
			background-image: url(firefox.png), url(bubbles.png), linear-gradient(to right, rgba(30, 75, 115, 1), rgba(255, 255, 255, 0));
		}


		header {
			grid-area: header;
			background-color: #555555;
			background-image: url(firefox.png), url(bubbles.png), linear-gradient(to top, rgba(0, 0, 0, 0.2), rgba(255, 255, 255, 0.2));
		}

		footer {
			grid-area: footer;
			background-color: #555555;
			background-image: url(firefox.png), url(bubbles.png), linear-gradient(to top, rgba(0, 0, 0, 0.2), rgba(255, 255, 255, 0.2));
		}

		main {
			grid-area: main;
			background-color: #699EBD;
			overflow: auto;
		}

		aside section {
			/* width: calc(100% - 0px); */
			/* height: calc(10% - 0px); */
			display: grid;
			grid-template-columns: auto;
			grid-auto-rows: minmax(min-content, max-content) auto minmax(min-content, max-content);
			grid-template-areas:
				"header"
				"main"
				"footer";
		}

		/* .grid aside {
				width: calc(100% - 0px);
				height: calc(50% - 0px);
				display: grid;
				grid-template-columns: auto;
				grid-auto-rows: minmax(min-content, max-content) auto minmax(min-content, max-content);
			} */



		.left,
		.right {
			background-color: #494949;
			width: calc(100% - 0px);
			height: calc(100% - 0px);
			/*  */
		}

		.left {
			grid-area: left;
			overflow: auto;
		}

		.right {
			grid-area: right;
			overflow: auto;
		}

		.content {
			/* overflow: auto; */
			/* width: calc(100% - 0px);*/
			/* height: calc(100% - 0px); */

			background-image: linear-gradient(to top, rgba(0, 0, 0, 0.2), rgba(255, 255, 255, 0.2));


		}







		.multi-bg-example {
			width: 100%;
			height: 400px;
			background-image: url(firefox.png), url(bubbles.png), linear-gradient(to right, rgba(30, 75, 115, 1), rgba(255, 255, 255, 0));
			background-repeat: no-repeat, no-repeat, no-repeat;
			background-position: bottom right, left, right;
		}
	</style>
	<script type="module" defer src="lib/main.js"></script>
</head>

<body>
	<h1>Coming Soonish!</h1>
	<p>Migrating... go away!</p>
</body>

</html>
